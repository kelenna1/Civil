{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:var(--space-8);">
  <div style="text-align:center;">
    <div style="font-size:6rem;font-weight:900;letter-spacing:-0.05em;color:var(--danger);line-height:1;">500</div>
    <h2 style="font-size:var(--text-xl);font-weight:700;margin:var(--space-4) 0 var(--space-2);">Something Went Wrong</h2>
    <p style="color:var(--text-tertiary);margin-bottom:var(--space-8);">We're working on fixing this. Please try again later.</p>
    <a href="/" style="color:var(--accent-light);font-weight:600;">Go Home →</a>
  </div>
</div>
{% endblock %}
