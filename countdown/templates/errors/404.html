{% extends 'base.html' %}
{% block title %}404 — Not Found{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:var(--space-8);">
  <div style="text-align:center;">
    <div style="font-size:6rem;font-weight:900;letter-spacing:-0.05em;background:linear-gradient(135deg,var(--accent-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;">404</div>
    <h2 style="font-size:var(--text-xl);font-weight:700;margin:var(--space-4) 0 var(--space-2);">Page Not Found</h2>
    <p style="color:var(--text-tertiary);margin-bottom:var(--space-8);">The page you're looking for doesn't exist.</p>
    <a href="{% url 'home' %}" class="btn btn--secondary">Go Home →</a>
  </div>
</div>
{% endblock %}
