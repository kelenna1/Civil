{% extends 'base.html' %}

{% block title %}Unsubscribed — CandlesDown{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:var(--space-8);">
  <div class="glass-card" style="max-width:440px;text-align:center;">
    <div style="font-size:var(--text-5xl);margin-bottom:var(--space-6);">👋</div>
    <h1 style="font-size:var(--text-2xl);font-weight:800;margin-bottom:var(--space-3);">You're Unsubscribed</h1>
    <p style="color:var(--text-tertiary);margin-bottom:var(--space-8);">
      You'll no longer receive birthday notifications for {{ organization.name }}.
    </p>
    <a href="{% url 'home' %}" class="btn btn--secondary">Go to CandlesDown →</a>
  </div>
</div>
{% endblock %}
